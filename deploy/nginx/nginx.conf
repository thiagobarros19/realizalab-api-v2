user  www-data;
worker_processes auto;

worker_cpu_affinity auto;
#accept_mutex off;
#accept_mutex on;
#accept_mutex_delay 500ms;

# apenas registra erros críticos
error_log  /var/log/nginx/error.log crit;
pid        /var/run/nginx.pid;

# número de descritores de arquivo usados para nginx
# o limite para o máximo de FDs no servidor geralmente é definido pelo sistema operacional.
# se você não definir os FDs, as configurações do sistema operacional serão usadas, o que é, por padrão, 2000
#worker_rlimit_nofile 100000;

# fornece o contexto do arquivo de configuração no qual as diretivas que afetam o processamento da conexão são especificadas.
events {
        # determina quantos clientes serão atendidos por trabalhador
        # max clientes = worker_connections * worker_processes
        # max clients também é limitado pelo número de conexões de soquete disponíveis no sistema (~64k)
        worker_connections 256;

        # otimizado para atender muitos clientes com cada thread, essencial para linux -- para ambiente de teste
        #use epoll;

        # aceitar o maior número de conexões possível, pode inundar as conexões do trabalhador se definido muito baixo - para ambiente de teste
        # multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Apenas por razões de segurança
    server_tokens off;

    # *** se o tamanho do corpo da solicitação for maior que o tamanho do buffer, todo (ou parcial)

    # corpo da solicitação é gravado em um arquivo temporário
    client_body_buffer_size  128k;

    # tamanho do buffer para ler o cabeçalho da solicitação do cliente -- para ambiente de teste
    #client_header_buffer_size 3m;

    # número e tamanho máximos de buffers para cabeçalhos grandes para leitura da solicitação do cliente
    large_client_header_buffers 4 256k;


    # leia o tempo limite para o corpo da solicitação do cliente -- para ambiente de teste
    #client_body_timeout   3m;
    client_body_timeout 60;

    # quanto tempo esperar para o cliente enviar um cabeçalho de solicitação - para ambiente de teste
    #client_header_timeout 3m;

    # informações de cache sobre FDs, arquivos acessados com frequência
    # pode aumentar o desempenho, mas você precisa testar esses valores
    #open_file_cache max=200000 inactive=20s; #
    #open_file_cache_valid 30s; #
    #open_file_cache_min_uses 2; #
    #open_file_cache_errors on; #

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # para aumentar o I/O no HDD podemos desabilitar os logs de acesso
    #access_log  /var/log/nginx/access.log  main;
    access_log off;

    # copia dados entre um FD e outro de dentro do kernel
    # mais rápido que read() + write()
    sendfile on;

    # enviar cabeçalhos inteiros, é melhor do que enviá-los um por um
    tcp_nopush on;

    # não armazena em buffer os dados enviados, bom para pequenas rajadas de dados em tempo real
    #tcp_nodelay on;

    # reduza os dados que precisam ser enviados pela rede -- para ambiente de teste
    #gzip on;
    # gzip_static on;
    #gzip_min_length 10240;
    #gzip_comp_level 1;
    #gzip_vary on;
    #gzip_disable msie6;
    #gzip_proxied expired no-cache no-store private auth;
    #gzip_types
        # text/html is always compressed by HttpGzipModule
        #text/css
        #text/javascript
        #text/xml
        #text/plain
        #text/x-component
        #application/javascript
        #application/x-javascript
        #application/json
        #application/xml
        #application/rss+xml
        #application/atom+xml
        #font/truetype
        #font/opentype
        #application/vnd.ms-fontobject
        #image/svg+xml;

    # permitir que o servidor feche a conexão no cliente que não responde, isso liberará memória
    reset_timedout_connection on;

    # se o cliente parar de responder, libere memória -- padrão 60
    #send_timeout 2;

    # o servidor fechará a conexão após esse período -- padrão 75
    keepalive_timeout 65;

    # número de solicitações que o cliente pode fazer durante o keep-alive -- para ambiente de teste
    #keepalive_requests 100000; #

    include /etc/nginx/conf.d/*.conf;
}
